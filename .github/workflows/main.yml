name: Deploy Vite to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy_1.outputs.page_url || steps.deploy_2.outputs.page_url || steps.deploy_3.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deploy_1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deploy_1.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy to GitHub Pages
        id: deploy_2
        if: steps.deploy_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before final retry
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        run: sleep 120

      - name: Final retry deploy to GitHub Pages
        id: deploy_3
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        uses: actions/deploy-pages@v4
